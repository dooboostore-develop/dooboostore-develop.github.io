name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # main 브랜치에 push될 때 실행

  # GitHub Actions 탭에서 수동으로 실행 가능하게 설정
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 실행 방지 (이전 배포가 진행 중이면 취소)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true # 혹시 대용량 파일이 있다면 대응

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # 사용 중인 pnpm 버전에 맞춰 조정 가능

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      # 빌드된 결과물(루트에 생성된 파일들)을 업로드
      # 빌드 결과물이 루트에 생성되도록 설정했으므로 전체를 업로드하되, 소스는 제외하는 필터링이 필요할 수 있습니다.
      # 하지만 GitHub Pages용 'upload-pages-artifact'는 기본적으로 전체를 압축합니다.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 배포할 경로 (우리는 루트에 파일이 생성되므로 '.' 사용)
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
