<div class="code-example">
    <div class="code-header">
        <span class="code-title">${@this@.title}$</span>
        <button class="code-copy-btn" dr-event-click="@this@.copyCode($element)"><i class="fa-solid fa-floppy-disk"></i></button>
    </div>
    <pre><code class="${@this@.codeClass}$">#innerHTML#</code></pre>
</div>
